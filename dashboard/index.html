<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>OpenChat</title>
    <meta name="description" content="OpenChat — live chat and lead capture for your website. Talk to visitors in real time, collect leads, and never miss a conversation." />
    <meta name="author" content="OpenChat" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="OpenChat" />
    <meta property="og:description" content="Live chat and lead capture for your website. Talk to visitors in real time and never miss a conversation." />
    <meta property="og:image"       content="/logo.png" />
    <meta property="og:url"         content="https://openchat-project.web.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="OpenChat" />
    <meta name="twitter:description" content="Live chat and lead capture for your website." />
    <meta name="twitter:image"       content="/logo.png" />

    <!-- PWA color -->
    <meta name="theme-color" content="#C8F135" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
